version: "3.8"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  arena:
    build: .
    restart: unless-stopped
    ports:
      - "${ARENA_PORT:-8080}:8080"
    env_file: .env
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
    depends_on:
      clickhouse:
        condition: service_healthy
      osprey-worker:
        condition: service_healthy
    command: ["python", "main.py", "arena", "--no-dev-mode"]

  admin:
    build: .
    env_file: .env
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
    depends_on:
      clickhouse:
        condition: service_healthy
    command: ["python", "main.py", "admin", "--dev-mode"]
    stdin_open: true
    tty: true
    profiles:
      - admin

  # ── Osprey rule engine ──────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  osprey-worker:
    image: ghcr.io/roostorg/osprey:latest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_INPUT_TOPIC: sara.events.input
      KAFKA_OUTPUT_TOPIC: sara.events.output
      OSPREY_RULES: /app/osprey_rules
      LOG_LEVEL: INFO
    volumes:
      - ./osprey_rules:/app/osprey_rules:ro
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  osprey-ui-api:
    image: ghcr.io/roostorg/osprey-ui-api:latest
    depends_on:
      - osprey-worker
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_OUTPUT_TOPIC: sara.events.output
    ports:
      - "5004:5004"

  osprey-ui:
    image: ghcr.io/roostorg/osprey-ui:latest
    depends_on:
      - osprey-ui-api
    environment:
      VITE_API_URL: http://osprey-ui-api:5004
    ports:
      - "5002:5002"

volumes:
  clickhouse_data:
