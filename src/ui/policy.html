<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arena — Sara · Policy Rules</title>
<style>
  :root{
    --bg:#d2b48c;--surface:#dfc99e;--surface2:#ecddb8;--border:#c09060;
    --text:#111111;--text2:#6b5040;--accent:#4a5bc8;--accent-dim:#3040a0;
    --red:#c0392b;--green:#1a7a3a;--orange:#c07800;--blue:#2563b0;--yellow:#8a6800;
    --font:'SF Mono','Cascadia Code','Fira Code','JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  ::placeholder{color:#9a7a58;}
  textarea,input,select,button{font-family:inherit;font-size:inherit;color:var(--text);}
  a{color:var(--accent);text-decoration:none;} a:hover{color:var(--accent-dim);}
  .topbar{display:flex;align-items:center;gap:22px;padding:14px 26px;background:var(--surface);border-bottom:1px solid var(--border);}
  .brand{font-weight:700;font-size:19px;}
  .stats{display:flex;gap:20px;margin-left:8px;} .stat{font-size:11px;color:var(--text2);letter-spacing:.06em;} .stat b{color:var(--text);font-weight:700;}
  .pills{margin-left:auto;display:flex;gap:10px;}
  .pill{padding:6px 14px;border-radius:8px;border:1px solid var(--border);display:flex;flex-direction:column;line-height:1.25;}
  .pill small{font-size:9px;color:var(--text2);} .pill b{font-size:12px;font-weight:700;letter-spacing:.06em;}
  .pill.active{background:var(--accent);border-color:var(--accent);color:#fff;} .pill.active small{color:rgba(255,255,255,.8);}
  .subnav{display:flex;gap:26px;padding:0 26px;background:var(--surface);border-bottom:1px solid var(--border);}
  .subnav a{padding:12px 2px;color:var(--text2);font-weight:500;border-bottom:2px solid transparent;}
  .subnav a.active{color:var(--text);font-weight:700;border-bottom-color:var(--accent);}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 24px;}
  .split{display:grid;grid-template-columns:440px 1fr;gap:16px;align-items:start;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;}
  .phead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .eyebrow{font-size:10px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;color:var(--text2);}
  .btn{padding:8px 14px;border-radius:8px;border:1px solid var(--accent);background:var(--accent);color:#fff;font-weight:600;cursor:pointer;}
  .btn:hover{background:var(--accent-dim);} .btn[disabled]{opacity:.5;cursor:default;}
  .btn.ghost{background:transparent;color:var(--accent);} .btn.ghost:hover{background:rgba(74,91,200,.1);}
  .btn.danger{background:transparent;color:var(--red);border-color:var(--red);} .btn.danger:hover{background:rgba(192,57,43,.1);}
  input[type=text],input[type=search],select,textarea{width:100%;padding:9px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;}
  .fchip{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:12px;}
  .fchip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .rule{border:1px solid var(--border);border-radius:8px;padding:11px 12px;margin-bottom:8px;cursor:pointer;background:var(--surface2);}
  .rule.sel{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent);}
  .rule .name{font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .rule .meta{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
  .chip{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;}
  .soft-accent{color:var(--accent);background:rgba(74,91,200,.2);}
  .soft-red{color:var(--red);background:rgba(192,57,43,.15);}
  .soft-orange{color:var(--orange);background:rgba(192,120,0,.15);}
  .soft-blue{color:var(--blue);background:rgba(37,99,176,.15);}
  .soft-green{color:var(--green);background:rgba(26,122,58,.15);}
  .badge{font-weight:700;font-size:11px;letter-spacing:.04em;padding:2px 8px;border-radius:5px;}
  .status-active{color:var(--green);} .status-inactive{color:var(--text2);}
  .field{margin-top:12px;} .field label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .toggle{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .toggle button{padding:7px 14px;background:var(--surface2);border:none;cursor:pointer;color:var(--text2);}
  .toggle button.on{background:var(--accent);color:#fff;}
  .code{background:#2b2418;color:#dfc99e;border-radius:8px;padding:12px;white-space:pre-wrap;font-size:12px;margin-top:8px;}
  .row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(192,144,96,.3);}
  .row:last-child{border-bottom:none;}
  .msg{margin-top:10px;padding:8px 10px;border-radius:6px;font-size:12px;display:none;}
  .muted{color:var(--text2);} .actions{display:flex;gap:8px;margin-top:14px;}
  .empty{color:var(--text2);padding:20px 4px;}
</style>
</head>
<body>
  <div class="topbar">
    <span class="brand">Arena</span>
    <div class="stats"><span class="stat">RULES <b id="stat-rules">—</b></span></div>
    <div class="pills">
      <a class="pill active" href="/classify"><b>SARA</b><small>classifying agent</small></a>
      <a class="pill" href="/sheila"><b>SHEILA</b><small>red-team agent</small></a>
    </div>
  </div>
  <div class="subnav">
    <a href="/overview">Overview</a>
    <a href="/classify">Classify</a>
    <a class="active" href="/policy">Policy Rules</a>
    <a href="/violations">Monitor Violations</a>
  </div>

  <div class="wrap">
    <div class="split">
      <!-- LEFT: rule list -->
      <div class="panel">
        <div class="phead">
          <span class="eyebrow">Policy Rules</span>
          <button class="btn" onclick="newRule()">+ New Rule</button>
        </div>
        <input type="search" id="search" placeholder="Search rules by description…" oninput="renderList()">
        <div class="chips" id="fchips"></div>
        <div id="rulelist"><div class="empty">Loading…</div></div>
      </div>

      <!-- RIGHT: creator OR detail -->
      <div class="panel" id="right">
        <!-- populated by JS -->
      </div>
    </div>
  </div>

<script>
const API = "";
const ORG = new URLSearchParams(location.search).get("org_id") || "dao-001";
const CATEGORIES = ["pii_ip","illicit_activities","hate","sexual_content","prompt_security","violence_self_harm","misinformation"];
const ACTIONS = ["LOG","ALERT","STOP"];
const SEVERITIES = ["low","medium","high","critical"];

let rules = [];
let selectedId = null;
let mode = "nl";      // 'nl' | 'sml'
let filter = "all";

function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function sevClass(s){return s==="critical"?"soft-red":s==="high"?"soft-orange":s==="medium"?"soft-blue":"soft-accent";}
function actClass(a){return a==="STOP"?"soft-red":a==="ALERT"?"soft-orange":"soft-green";}

async function loadRules(){
  try{
    const r = await fetch(`${API}/osprey/rules/${encodeURIComponent(ORG)}`);
    const d = await r.json();
    rules = d.rules || [];
  }catch(e){ rules = []; }
  document.getElementById("stat-rules").textContent = rules.length;
  renderChips(); renderList();
  if (selectedId && rules.find(x=>x.rule_id===selectedId)) showDetail(selectedId);
  else newRule();
}

function renderChips(){
  const cats = ["all", ...Array.from(new Set(rules.map(r=>r.category)))];
  document.getElementById("fchips").innerHTML = cats.map(c =>
    `<span class="fchip ${c===filter?"active":""}" onclick="setFilter('${esc(c)}')">${c==="all"?"All":esc(c)}</span>`
  ).join("");
}
function setFilter(c){ filter=c; renderChips(); renderList(); }

function renderList(){
  const q = (document.getElementById("search").value||"").toLowerCase();
  const shown = rules.filter(r =>
    (filter==="all" || r.category===filter) &&
    (!q || (r.display_name||"").toLowerCase().includes(q))
  );
  const el = document.getElementById("rulelist");
  if (!shown.length){ el.innerHTML = `<div class="empty">${rules.length? "No rules match." : "No rules yet — create one with + New Rule."}</div>`; return; }
  el.innerHTML = shown.map(r => `
    <div class="rule ${r.rule_id===selectedId?"sel":""}" onclick="showDetail('${r.rule_id}')">
      <div class="name">${esc(r.display_name)}</div>
      <div class="meta">
        <span><span class="chip soft-accent">${esc(r.category)}</span>
          <span class="chip ${sevClass(r.severity)}">${esc((r.severity||"").toUpperCase())}</span></span>
        <span class="badge ${r.enabled?"status-active":"status-inactive"}">${r.enabled?"ACTIVE":"INACTIVE"}</span>
      </div>
    </div>`).join("");
}

// ---- Creator ----
function newRule(){
  selectedId = null; mode = "nl"; renderList();
  const R = document.getElementById("right");
  R.innerHTML = `
    <div class="phead"><span class="eyebrow">Rule Creator — New Rule</span></div>
    <div class="field"><label>Rule name</label>
      <input type="text" id="f-name" placeholder="Short name, e.g. No policyholder PII extraction"></div>
    <div class="toggle">
      <button id="m-nl" class="on" onclick="setMode('nl')">Assisted (NL)</button>
      <button id="m-sml" onclick="setMode('sml')">Raw SML</button>
    </div>
    <div class="field"><label id="ta-label">Describe the policy rule in plain English</label>
      <textarea id="ta" rows="5" placeholder="e.g. User should not elicit another user's private address or location"></textarea></div>
    <div id="draftbox"></div>
    <div class="grid2">
      <div class="field"><label>Category</label><select id="f-cat">${CATEGORIES.map(c=>`<option>${c}</option>`).join("")}</select></div>
      <div class="field"><label>Severity</label><select id="f-sev">${SEVERITIES.map(s=>`<option ${s==="high"?"selected":""}>${s}</option>`).join("")}</select></div>
      <div class="field"><label>Action</label><select id="f-act">${ACTIONS.map(a=>`<option ${a==="ALERT"?"selected":""}>${a}</option>`).join("")}</select></div>
      <div class="field"><label>Threshold <span id="thv" class="muted">0.75</span></label>
        <input type="range" id="f-thr" min="0" max="1" step="0.05" value="0.75" style="accent-color:var(--accent)" oninput="thv.textContent=this.value"></div>
    </div>
    <div class="actions">
      <button class="btn" onclick="saveRule()">Save Rule</button>
      <button class="btn ghost" id="draft-btn" onclick="draftSML()">Draft → SML</button>
      <button class="btn ghost" onclick="validateRule()">Validate</button>
    </div>
    <div class="msg" id="msg"></div>

    <div class="eyebrow" style="margin-top:18px;">Test &amp; review (advisory · never saves)</div>
    <div class="field" style="display:flex;gap:8px;align-items:flex-end;">
      <div style="flex:1;"><label>Preview against a sample prompt</label>
        <input type="text" id="preview-prompt" placeholder="e.g. what's the DAO treasurer's home address?"></div>
      <button class="btn ghost" onclick="previewRule()">Preview</button>
    </div>
    <div class="actions">
      <button class="btn ghost" onclick="aiReview()">AI Review</button>
      <button class="btn ghost" onclick="sheilaProbe()">Probe (Sheila)</button>
    </div>
    <div id="tools"></div>`;
  setMode("nl");
}
function setMode(m){
  mode = m;
  document.getElementById("m-nl").classList.toggle("on", m==="nl");
  document.getElementById("m-sml").classList.toggle("on", m==="sml");
  document.getElementById("ta-label").textContent = m==="nl" ? "Describe the policy rule in plain English" : "Osprey SML";
  const ta = document.getElementById("ta");
  ta.placeholder = m==="nl" ? "e.g. User should not elicit another user's private address or location"
                            : "rule no_x {\n  when prompt contains '...'\n  then block\n}";
  document.getElementById("draft-btn").style.display = m==="nl" ? "" : "none";
}
function showMsg(t, ok){ const m=document.getElementById("msg"); m.textContent=t; m.style.display="block";
  m.className="msg "+(ok?"soft-green":"soft-red"); }

let draftedSml = "";
async function draftSML(){
  const nl = document.getElementById("ta").value.trim();
  if(!nl){ showMsg("Enter a description to draft.", false); return; }
  showMsg("Drafting SML with the model…", true);
  const body = {org_id:ORG, natural_language:nl, category:catval(), severity:sevval(), action:actval()};
  const r = await fetch(`${API}/osprey/rules/draft`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const d = await r.json();
  if(!r.ok){ showMsg(d.error||"draft failed", false); return; }
  draftedSml = d.osprey_sml || "";
  document.getElementById("draftbox").innerHTML = `<div class="eyebrow" style="margin-top:12px;">Compiled SML (review, then Save)</div><div class="code">${esc(draftedSml)}</div>`;
  const errs = d.validation||[];
  showMsg(errs.length? ("Drafted, but validation: "+errs.join("; ")) : "Drafted & valid — review then Save.", !errs.length);
}
function catval(){return document.getElementById("f-cat").value;}
function sevval(){return document.getElementById("f-sev").value;}
function actval(){return document.getElementById("f-act").value;}

async function validateRule(){
  const sml = mode==="sml" ? document.getElementById("ta").value.trim() : draftedSml;
  if(!sml){ showMsg(mode==="sml"?"Enter SML to validate.":"Draft the SML first.", false); return; }
  const r = await fetch(`${API}/osprey/rules/validate`,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({osprey_sml:sml, action:actval(), severity:sevval()})});
  const d = await r.json();
  showMsg(d.valid? "Valid — ready to save." : ("Invalid: "+(d.errors||[]).join("; ")), d.valid);
}

async function saveRule(){
  const cat=catval(), sev=sevval(), act=actval(), thr=parseFloat(document.getElementById("f-thr").value);
  const name = (document.getElementById("f-name").value||"").trim();
  const body = {org_id:ORG, category:cat, severity:sev, action:act, confidence_threshold:thr, created_by:"analyst"};
  if(name) body.display_name = name;
  if(mode==="sml"){ body.osprey_sml = document.getElementById("ta").value.trim(); }
  else { body.natural_language = document.getElementById("ta").value.trim();
         if(draftedSml) body.osprey_sml = draftedSml; }
  if(!body.osprey_sml && !body.natural_language){ showMsg("Describe or write the rule first.", false); return; }
  const r = await fetch(`${API}/osprey/rules`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const d = await r.json();
  if(!r.ok){ showMsg((d.error||"save failed")+(d.errors? ": "+d.errors.join("; "):""), false); return; }
  draftedSml=""; selectedId = d.rule_id; await loadRules();
}

// ---- Test & review (advisory) ----
function currentSml(){ return mode==="sml" ? document.getElementById("ta").value.trim() : draftedSml; }
function setTools(html){ const t=document.getElementById("tools"); if(t) t.innerHTML=html; }

async function previewRule(){
  const sml = currentSml(); const prompt = (document.getElementById("preview-prompt").value||"").trim();
  if(!sml){ showMsg(mode==="sml"?"Enter SML first.":"Draft the SML first.", false); return; }
  if(!prompt){ showMsg("Enter a sample prompt to preview.", false); return; }
  setTools('<div class="muted" style="margin-top:10px;">Classifying preview…</div>');
  const r = await fetch(`${API}/osprey/rules/test-draft`,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt, osprey_sml:sml, category:catval(), severity:sevval(), action:actval(), org_id:ORG})});
  const d = await r.json();
  if(!r.ok){ setTools(`<div class="msg soft-red" style="display:block;">${esc(d.error||"preview failed")}</div>`); return; }
  const act = d.action||"LOG";
  setTools(`<div class="row"><span class="muted">Preview verdict</span><span class="chip ${actClass(act)}">${act}</span></div>
            <div class="row"><span class="muted">Matched</span><span>${d.matched? "yes":"no match"}</span></div>
            <div class="row"><span class="muted">Confidence</span><span>${Number(d.confidence||0).toFixed(2)}</span></div>
            <div class="row"><span class="muted">Note</span><span style="max-width:60%;text-align:right;">${esc(d.explanation||"")}</span></div>`);
}

async function aiReview(){
  const sml = currentSml(); if(!sml){ showMsg("Provide SML first (Draft or Raw).", false); return; }
  setTools('<div class="muted" style="margin-top:10px;">Asking the model for a review…</div>');
  const r = await fetch(`${API}/osprey/rules/feedback`,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({osprey_sml:sml, natural_language: mode==="nl"?document.getElementById("ta").value.trim():""})});
  const d = await r.json();
  if(d.available===false){ setTools(`<div class="msg" style="display:block;background:var(--surface2);">${esc(d.note||"Feedback unavailable.")}</div>`); return; }
  setTools(`<div class="eyebrow" style="margin-top:14px;">AI Review (advisory)</div>
    <div class="row"><span class="muted">Coverage</span><span style="max-width:62%;text-align:right;">${esc(d.coverage)}</span></div>
    <div class="row"><span class="muted">Breadth / FP risk</span><span style="max-width:62%;text-align:right;">${esc(d.breadth)}</span></div>
    <div class="row"><span class="muted">Ambiguity</span><span style="max-width:62%;text-align:right;">${esc(d.ambiguity)}</span></div>
    ${d.suggested_rewrite? `<div class="eyebrow" style="margin-top:10px;">Suggested rewrite</div><div class="code">${esc(d.suggested_rewrite)}</div>`:""}`);
}

async function sheilaProbe(){
  const sml = currentSml(); if(!sml){ showMsg("Provide SML first (Draft or Raw).", false); return; }
  setTools('<div class="muted" style="margin-top:10px;">Sheila is probing for evasions…</div>');
  const r = await fetch(`${API}/osprey/rules/probe`,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({osprey_sml:sml, natural_language: mode==="nl"?document.getElementById("ta").value.trim():""})});
  const d = await r.json();
  if(d.available===false){ setTools('<div class="msg" style="display:block;background:var(--surface2);">Sheila probe unavailable (model not configured).</div>'); return; }
  const probes = d.probes||[];
  if(!probes.length){ setTools('<div class="muted" style="margin-top:10px;">No probes returned.</div>'); return; }
  setTools(`<div class="eyebrow" style="margin-top:14px;">Sheila evasion probes — ${d.evaded_count||0}/${probes.length} may evade</div>` +
    probes.map(p=>`<div class="rule" style="cursor:default;">
      <div><span class="chip ${p.evades?"soft-red":"soft-green"}">${p.evades?"MAY EVADE":"CAUGHT"}</span>
        <span class="chip soft-accent">${esc(p.technique||"")}</span></div>
      <div style="margin-top:6px;">${esc(p.attack||"")}</div>
      <div class="muted" style="font-size:11px;margin-top:4px;">${esc(p.rationale||"")}</div></div>`).join(""));
}

// ---- Detail ----
async function showDetail(id){
  const rule = rules.find(x=>x.rule_id===id); if(!rule) return;
  selectedId = id; renderList();
  // run deterministic validation for the status line
  let valid=true, errs=[];
  try{
    const vr = await fetch(`${API}/osprey/rules/validate`,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({osprey_sml:rule.osprey_sml, action:rule.action, severity:rule.severity})});
    const vd = await vr.json(); valid=vd.valid; errs=vd.errors||[];
  }catch(e){}
  const R = document.getElementById("right");
  R.innerHTML = `
    <div class="phead"><span class="eyebrow">Rule Detail · Validation</span>
      <span class="badge ${valid?"status-active":"status-inactive"}">${valid?"● VALIDATED · 0 ERRORS":"● "+errs.length+" ERRORS"}</span></div>
    <div style="font-weight:700;font-size:15px;margin:4px 0 10px;">${esc(rule.display_name)}</div>
    <div>
      <span class="chip soft-accent">${esc(rule.category)}</span>
      <span class="chip ${sevClass(rule.severity)}">${esc((rule.severity||"").toUpperCase())}</span>
      <span class="chip ${actClass(rule.action)}">${esc(rule.action)}</span>
      <span class="chip soft-accent">threshold ${Number(rule.confidence_threshold).toFixed(2)}</span>
    </div>
    <div class="eyebrow" style="margin-top:14px;">Compiled SML</div>
    <div class="code">${esc(rule.osprey_sml)}</div>
    ${errs.length? `<div class="msg soft-red" style="display:block;">${esc(errs.join("; "))}</div>`:""}
    <div class="row"><span class="muted">Status</span><span class="badge ${rule.enabled?"status-active":"status-inactive"}">${rule.enabled?"ACTIVE":"INACTIVE"}</span></div>
    <div class="row"><span class="muted">Created by</span><span>${esc(rule.created_by)} · v${rule.version}</span></div>
    <div class="actions">
      <button class="btn ghost" onclick="editRule('${id}')">Edit</button>
      ${rule.enabled
        ? `<button class="btn danger" onclick="setEnabled('${id}',false)">Deactivate</button>`
        : `<button class="btn" onclick="setEnabled('${id}',true)">Activate</button>`}
    </div>
    <div class="msg" id="msg"></div>`;
}

async function setEnabled(id, on){
  const r = await fetch(`${API}/osprey/rules/${id}`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({enabled:on})});
  if(r.ok){ await loadRules(); showDetail(id); }
}
function editRule(id){
  const rule = rules.find(x=>x.rule_id===id); if(!rule) return;
  newRule();
  setMode("sml");
  document.getElementById("f-name").value = rule.display_name || "";
  document.getElementById("ta").value = rule.osprey_sml;
  document.getElementById("f-cat").value = rule.category;
  document.getElementById("f-sev").value = rule.severity;
  document.getElementById("f-act").value = rule.action;
  document.getElementById("f-thr").value = rule.confidence_threshold;
  document.getElementById("thv").textContent = Number(rule.confidence_threshold).toFixed(2);
  showMsg("Editing a copy — Save creates a new version.", true);
}

loadRules();
</script>
</body>
</html>
