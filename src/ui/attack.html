<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arena — Sheila · Attack Runner</title>
<style>
  :root{
    --bg:#d2b48c;--surface:#dfc99e;--surface2:#ecddb8;--border:#c09060;
    --text:#111111;--text2:#6b5040;--accent:#4a5bc8;--accent-dim:#3040a0;
    --red:#c0392b;--green:#1a7a3a;--orange:#c07800;--blue:#2563b0;--yellow:#8a6800;
    --font:'SF Mono','Cascadia Code','Fira Code','JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  ::placeholder{color:#9a7a58;}
  input,select,textarea,button{font-family:inherit;font-size:inherit;color:var(--text);}
  a{color:var(--accent);text-decoration:none;} a:hover{color:var(--accent-dim);}
  .topbar{display:flex;align-items:center;gap:22px;padding:14px 26px;background:var(--surface);border-bottom:1px solid var(--border);}
  .brand{font-weight:700;font-size:19px;}
  .stats{display:flex;gap:20px;margin-left:8px;} .stat{font-size:11px;color:var(--text2);letter-spacing:.06em;} .stat b{color:var(--text);font-weight:700;}
  .pills{margin-left:auto;display:flex;gap:10px;}
  .pill{padding:6px 14px;border-radius:8px;border:1px solid var(--border);display:flex;flex-direction:column;line-height:1.25;}
  .pill small{font-size:9px;color:var(--text2);} .pill b{font-size:12px;font-weight:700;letter-spacing:.06em;}
  .pill.active{background:var(--accent);border-color:var(--accent);color:#fff;} .pill.active small{color:rgba(255,255,255,.8);}
  .subnav{display:flex;gap:26px;padding:0 26px;background:var(--surface);border-bottom:1px solid var(--border);}
  .subnav a{padding:12px 2px;color:var(--text2);font-weight:500;border-bottom:2px solid transparent;}
  .subnav a.active{color:var(--text);font-weight:700;border-bottom-color:var(--accent);}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 24px;}
  .split{display:grid;grid-template-columns:360px 1fr;gap:16px;align-items:start;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:16px;}
  .phead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .eyebrow{font-size:10px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;color:var(--text2);}
  .btn{padding:8px 14px;border-radius:8px;border:1px solid var(--accent);background:var(--accent);color:#fff;font-weight:600;cursor:pointer;}
  .btn:hover{background:var(--accent-dim);} .btn[disabled]{opacity:.5;cursor:default;}
  .btn.ghost{background:transparent;color:var(--accent);} .btn.ghost:hover{background:rgba(74,91,200,.1);}
  input[type=text],input[type=number],select,textarea{width:100%;padding:9px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;}
  textarea{resize:vertical;line-height:1.5;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;}
  .fchip{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:12px;}
  .fchip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .bounty{border:1px solid var(--border);border-radius:8px;padding:11px 12px;margin-bottom:8px;cursor:pointer;background:var(--surface2);}
  .bounty.sel{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent);}
  .bounty .top{display:flex;justify-content:space-between;align-items:baseline;}
  .bounty .name{font-weight:700;} .bounty .reward{color:var(--green);font-weight:700;}
  .chip{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;margin:2px 4px 0 0;}
  .soft-accent{color:var(--accent);background:rgba(74,91,200,.2);}
  .field{margin-top:12px;} .field label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(192,144,96,.3);}
  .row:last-child{border-bottom:none;}
  .badge{font-weight:700;font-size:11px;padding:2px 8px;border-radius:5px;}
  .b-caught{color:var(--green);background:rgba(26,122,58,.15);}
  .b-bypass{color:var(--red);background:rgba(192,57,43,.15);}
  .b-pending{color:var(--orange);background:rgba(192,120,0,.15);}
  .muted{color:var(--text2);} .mono{font-family:var(--font);}
  .msg{margin-top:10px;font-size:12px;} .ok{color:var(--green);} .err{color:var(--red);}
  .counter{font-size:11px;color:var(--text2);margin-top:4px;}
</style>
</head>
<body>
  <div class="topbar">
    <span class="brand">Arena</span>
    <div class="stats"><span class="stat">BOUNTIES <b id="stat-b">—</b></span></div>
    <div class="pills">
      <a class="pill" href="/classify"><b>SARA</b><small>classifying agent</small></a>
      <a class="pill active" href="/attack"><b>SHEILA</b><small>red-team agent</small></a>
    </div>
  </div>
  <div class="subnav">
    <a class="active" href="/attack">Attack Runner</a>
    <a href="/redteam">Red Team</a>
    <a href="/crt">Collaborative RT</a>
    <a href="/overview">Overview</a>
  </div>

  <div class="wrap">
    <div class="split">
      <!-- LEFT: bounties -->
      <div class="panel">
        <div class="phead"><span class="eyebrow">Active Bounties</span>
          <button class="btn" onclick="newBounty()">+ New Bounty</button></div>
        <div class="chips" id="fchips"></div>
        <div id="blist"><div class="muted">Loading…</div></div>
      </div>
      <!-- RIGHT -->
      <div id="right"><!-- attack or create --></div>
    </div>
  </div>

<script>
const DEV_WALLET = "0x" + "b".repeat(40);
let bounties = [], selected = null, filter = "all", view = "attack";
let bountySrc = "blank", newCats = [], allCats = [], currentSub = null, pollTimer = null;

function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function payHeader(wallet, amount){
  return btoa(JSON.stringify({sender:wallet, amount:String(amount), signature:"dev-sig",
    timestamp:Date.now()/1000, nonce:Math.random()}));
}
async function getj(u){ try{ const r=await fetch(u); return await r.json(); }catch(e){ return null; } }

async function init(){
  const tax = await getj("/api/taxonomy");
  allCats = ((tax && tax.categories) || []).map(c => c.id);
  await loadBounties();
}

async function loadBounties(){
  const d = await getj("/api/bounties");
  bounties = (d && d.bounties) || [];
  document.getElementById("stat-b").textContent = bounties.length;
  renderChips(); renderList();
  if(view === "attack"){ if(!selected && bounties.length) selected = bounties[0].bounty_id; renderAttack(); }
}
function renderChips(){
  const cats = ["all", ...Array.from(new Set(bounties.flatMap(b => b.categories||[])))];
  document.getElementById("fchips").innerHTML = cats.map(c =>
    `<span class="fchip ${c===filter?"active":""}" onclick="setFilter('${esc(c)}')">${c==="all"?"All":esc(c)}</span>`).join("");
}
function setFilter(c){ filter=c; renderChips(); renderList(); }
function renderList(){
  const shown = bounties.filter(b => filter==="all" || (b.categories||[]).includes(filter));
  const el = document.getElementById("blist");
  if(!shown.length){ el.innerHTML = `<div class="muted">No bounties. Create one with + New Bounty.</div>`; return; }
  el.innerHTML = shown.map(b => `
    <div class="bounty ${b.bounty_id===selected?"sel":""}" onclick="pick('${b.bounty_id}')">
      <div class="top"><span class="name">${esc(b.target_model_name||"model")}</span>
        <span class="reward">≤ $${Number(b.max_payout_per_finding||0).toFixed(0)}</span></div>
      <div>${(b.categories||[]).map(c=>`<span class="chip soft-accent">${esc(c)}</span>`).join("")}</div>
      <div class="muted" style="font-size:11px;margin-top:4px;">pool $${Number(b.remaining_usdc||0).toFixed(0)} / $${Number(b.pool_usdc||0).toFixed(0)}</div>
    </div>`).join("");
}
function pick(id){ selected=id; view="attack"; renderList(); renderAttack(); }

// ── Attack mode ──────────────────────────────────────────────────────────────
function renderAttack(){
  const b = bounties.find(x=>x.bounty_id===selected);
  const R = document.getElementById("right");
  if(!b){ R.innerHTML = `<div class="panel"><div class="muted">Select a bounty to run an attack, or create one.</div></div>`; return; }
  R.innerHTML = `
    <div class="panel">
      <div class="eyebrow">Submit Attack</div>
      <div class="row"><span class="muted">Target</span><span><strong>${esc(b.target_model_name||"model")}</strong> · ≤ $${Number(b.max_payout_per_finding||0).toFixed(0)}/finding</span></div>
      <div class="field"><label>Attack prompts (one per line, 1–50)</label>
        <textarea id="prompts" rows="6" oninput="counter()" placeholder="How can I use a flash loan to take over a DAO's governance and drain its treasury?"></textarea>
        <div class="counter" id="pcount">0 chars · 0 lines</div></div>
      <div class="grid2">
        <div class="field"><label>Your EVM wallet address</label><input type="text" id="wallet" value="${DEV_WALLET}"></div>
        <div class="field"><label>Commitment hash · SHA3-256</label>
          <div style="display:flex;gap:6px;"><input type="text" id="commit" readonly placeholder="server-verified" style="flex:1;">
            <button class="btn ghost" onclick="computeHash()">Compute</button></div></div>
      </div>
      <div style="margin-top:12px;"><button class="btn" onclick="runAttack()">▶ Run Attack</button></div>
      <div class="msg" id="atk-msg"></div>
    </div>
    <div class="panel" id="results" style="display:none;">
      <div class="eyebrow">Results · Sara verdict</div>
      <div id="rbody"></div>
      <div class="muted" style="font-size:11px;margin-top:8px;">Bypasses surface as weak spots in Sara → <a href="/policy">Policy Rules</a>.</div>
    </div>`;
}
function counter(){
  const v = document.getElementById("prompts").value;
  const lines = v.split("\n").filter(x=>x.trim()).length;
  document.getElementById("pcount").textContent = `${v.length} chars · ${lines} lines`;
}
function getPrompts(){ return document.getElementById("prompts").value.split("\n").map(x=>x.trim()).filter(Boolean); }

async function computeHash(){
  const prompts = getPrompts();
  const msg = document.getElementById("atk-msg");
  if(!prompts.length){ msg.className="msg err"; msg.textContent="Enter at least one prompt."; return; }
  const r = await fetch("/researcher/commitment",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompts})});
  const d = await r.json();
  if(d.commitment){ document.getElementById("commit").value = d.commitment; msg.className="msg ok"; msg.textContent="Commitment computed."; }
  else { msg.className="msg err"; msg.textContent = d.error || "commitment failed"; }
}

async function runAttack(){
  const prompts = getPrompts();
  const wallet = document.getElementById("wallet").value.trim();
  const msg = document.getElementById("atk-msg");
  if(!prompts.length || prompts.length > 50){ msg.className="msg err"; msg.textContent="1–50 prompts required."; return; }
  msg.className="msg"; msg.textContent="Submitting…";
  const r = await fetch("/api/submit",{method:"POST",
    headers:{"Content-Type":"application/json","x-payment":payHeader(wallet,"0.01")},
    body:JSON.stringify({bounty_id:selected, prompts})});
  const d = await r.json();
  if(!r.ok){ msg.className="msg err"; msg.textContent = "Submit failed: " + (d.error||r.status); return; }
  currentSub = d.submission_id;
  msg.className="msg ok"; msg.textContent = "Queued: " + currentSub + " — Sheila's attacks are being judged by Sara…";
  document.getElementById("results").style.display = "block";
  startPoll();
}
function startPoll(){
  if(pollTimer) clearInterval(pollTimer);
  let n = 0;
  pollTimer = setInterval(async () => {
    n++; if(n > 40){ clearInterval(pollTimer); return; }
    const d = await getj(`/api/submissions/${currentSub}`);
    if(!d) return;
    renderResult(d);
    if(["scored","paid","rejected","failed","completed"].includes((d.status||"").toLowerCase())){ clearInterval(pollTimer); }
  }, 1500);
}
function renderResult(d){
  const ev = d.evaluation;
  const st = (d.status||"pending");
  let head = `<div class="row"><span class="muted">Status</span><span class="badge b-pending">${esc(st.toUpperCase())}</span></div>`;
  if(ev){
    const score = Number(ev.total_score||0), payout = Number(ev.payout_usdc||0);
    const verdict = payout > 0 ? {t:"BYPASS PAID", c:"b-bypass"} : {t:"HELD", c:"b-caught"};
    head = `<div class="row"><span class="muted">Sara verdict</span><span class="badge ${verdict.c}">${verdict.t}</span></div>
      <div class="row"><span class="muted">Aggregate score</span><span>${score.toFixed(3)}</span></div>
      <div class="row"><span class="muted">Payout</span><span>$${payout.toFixed(2)} USDC</span></div>`;
    const cov = ev.category_coverage || {};
    const keys = Object.keys(cov);
    if(keys.length) head += `<div class="field"><label>Category coverage</label><div>${keys.map(k=>`<span class="chip soft-accent">${esc(k)}</span>`).join("")}</div></div>`;
    head += `<div class="muted" style="font-size:11px;margin-top:6px;">Per-prompt verdicts are GDPR-hashed (only SHA3 stored); the aggregate score/payout is the Sara judgment.</div>`;
  } else {
    head += `<div class="muted" style="margin-top:8px;">${esc(d.prompts_count||0)} prompt(s) submitted — awaiting evaluation…</div>`;
  }
  document.getElementById("rbody").innerHTML = head;
}

// ── Create Bounty ────────────────────────────────────────────────────────────
function newBounty(){
  view = "create";
  const b = bounties.find(x=>x.bounty_id===selected);
  if(bountySrc==="clone" && b) newCats = [...(b.categories||[])]; else newCats = [];
  const R = document.getElementById("right");
  R.innerHTML = `
    <div class="panel">
      <div class="phead"><span class="eyebrow">New Bounty</span><button class="btn ghost" onclick="view='attack';renderAttack()">Cancel</button></div>
      <label class="eyebrow" style="font-size:10px;">Add a bounty by</label>
      <div class="chips" id="srcchips"></div>
      <div class="muted" id="srchint" style="font-size:11px;"></div>
      <div class="grid2">
        <div class="field"><label>Target model name</label><input type="text" id="b-name" placeholder="demo-model"></div>
        <div class="field"><label>Target model endpoint</label><input type="text" id="b-endpoint" placeholder="https://api.example.com/v1/chat"></div>
      </div>
      <div class="field"><label>Attack categories · tap to include</label><div class="chips" id="catchips"></div></div>
      <div class="grid2">
        <div class="field"><label>Reward pool · USDC</label><input type="number" id="b-pool" value="500" min="1"></div>
        <div class="field"><label>Max payout / finding</label><input type="number" id="b-max" value="10" min="1"></div>
        <div class="field"><label>Funder wallet</label><input type="text" id="b-funder" value="${DEV_WALLET}"></div>
        <div class="field"><label>Expires</label><select id="b-exp"><option value="7">7 days</option><option value="30">30 days</option><option value="0">No expiry</option></select></div>
      </div>
      <div style="margin-top:12px;"><button class="btn" onclick="fundBounty()">Fund &amp; Publish</button>
        <span class="muted" style="font-size:11px;margin-left:8px;">Escrows the pool · released per verified finding.</span></div>
      <div class="msg" id="cb-msg"></div>
    </div>`;
  renderSrc(); renderCatChips();
  if(bountySrc==="clone" && b){ document.getElementById("b-name").value = (b.target_model_name||"") + " (copy)"; document.getElementById("b-endpoint").value = b.target_model_endpoint||""; }
}
function renderSrc(){
  const opts = [["blank","Blank"],["clone","Clone selected"],["template","Template pack"]];
  document.getElementById("srcchips").innerHTML = opts.map(([v,l]) =>
    `<span class="fchip ${v===bountySrc?"active":""}" onclick="setSrc('${v}')">${l}</span>`).join("");
  const hints = {blank:"Start from scratch.", clone:"Clone the selected bounty — categories & payouts prefilled.", template:"Use a preset category pack."};
  document.getElementById("srchint").textContent = hints[bountySrc];
}
function setSrc(v){ bountySrc=v; if(v==="template") newCats=allCats.slice(0,3); newBounty(); }
function renderCatChips(){
  const cats = allCats.length ? allCats : ["prompt_injection","jailbreak","pii_extraction"];
  document.getElementById("catchips").innerHTML = cats.map(c =>
    `<span class="fchip ${newCats.includes(c)?"active":""}" onclick="toggleCat('${esc(c)}')">${esc(c)}</span>`).join("");
}
function toggleCat(c){ const i=newCats.indexOf(c); if(i<0)newCats.push(c); else newCats.splice(i,1); renderCatChips(); }

async function fundBounty(){
  const msg = document.getElementById("cb-msg");
  const pool = parseFloat(document.getElementById("b-pool").value||"0");
  const endpoint = document.getElementById("b-endpoint").value.trim();
  const funder = document.getElementById("b-funder").value.trim();
  if(pool <= 0){ msg.className="msg err"; msg.textContent="Reward pool must be > 0."; return; }
  if(!endpoint){ msg.className="msg err"; msg.textContent="Target endpoint required."; return; }
  msg.className="msg"; msg.textContent="Funding…";
  const body = {
    target_model_name: document.getElementById("b-name").value.trim(),
    target_model_endpoint: endpoint,
    categories: newCats.length ? newCats : undefined,
    pool_usdc: pool,
    max_payout_per_finding: parseFloat(document.getElementById("b-max").value||"10"),
  };
  const r = await fetch("/api/bounties",{method:"POST",
    headers:{"Content-Type":"application/json","x-payment":payHeader(funder,pool)},
    body:JSON.stringify(body)});
  const d = await r.json();
  if(!r.ok){ msg.className="msg err"; msg.textContent = "Fund failed: " + (d.error||r.status); return; }
  selected = d.bounty_id; view = "attack";
  await loadBounties();
}

init();
</script>
</body>
</html>
